# Autostart
exec-once = mullvad-vpn
exec-once = wl-clip-persist --clipboard regular --reconnect-tries 0
exec-once = wl-paste --type text --watch cliphist store
exec-once = dunst
exec-once = swaybg -i ~/wallpapers/frutiger.jpg
exec-once = brightnessctl set 25%
exec-once = pkill waybar;waybar

# Programs
bind = SUPER,	b,	spawn,	librewolf
bind = SUPER,	e,	spawn,	thunar

# Lock
bind = SUPER,	l,	spawn,	swaylock

# Scripts
bind = SUPER+SHIFT,	s,						spawn,	~/.config/scripts/screenshot.sh
bind = NONE, 		XF86MonBrightnessUp, 	spawn, 	~/.config/scripts/brightness.sh up
bind = NONE, 		XF86MonBrightnessDown, 	spawn, 	~/.config/scripts/brightness.sh down
bind = NONE, 		XF86AudioRaiseVolume, 	spawn, 	~/.config/scripts/volume.sh up
bind = NONE, 		XF86AudioLowerVolume, 	spawn, 	~/.config/scripts/volume.sh down
bind = NONE, 		XF86AudioMute, 			spawn, 	~/.config/scripts/volume.sh mute
bind = NONE, 		XF86AudioMicMute, 		spawn, 	~/.config/scripts/volume.sh mute-mic

# Resize
bind = SUPER+CTRL, Left, 	resizewin, -50,	0
bind = SUPER+CTRL, Right, 	resizewin, +50,	0
bind = SUPER+CTRL, Up, 		resizewin, 0,	-50
bind = SUPER+CTRL, Down, 	resizewin, 0,	50

# Opacity
focused_opacity   = 1.0
unfocused_opacity = 1.0

# Animation Configuration
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide 
layer_animation_type_open=slide
layer_animation_type_close=slide 
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.7
fadein_begin_opacity=0.8
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=400
animation_curve_open=0.46,1.0,0.29,1.1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.58,0.98,0.58,0.98
animation_curve_opafadein=0.46,1.0,0.29,1

# Blur
blur = 1
blur_layer = 0

# Shadows
shadows=1
layer_shadows=1
shadow_only_floating=1
shadows_size=15
shadows_blur=20
shadows_position_x=0
shadows_position_y=5
shadowscolor=0x2a7fc966

# Border radius
border_radius = 16

# Overview Settings
enable_hotarea = 0

# Misc
no_border_when_single 	= 0
focus_on_activate 		= 1
sloppyfocus 			= 0
warpcursor 				= 1
focus_cross_monitor 	= 1
cursor_size 			= 16
cursor_theme 			= Adwaita
drag_tile_to_tile 		= 1
drag_tile_small 		= 1

# Keyboard
repeat_rate 		= 35
repeat_delay 		= 300
xkb_rules_layout 	= us
xkb_rules_variant 	= intl

# Trackpad (needs relogin)
tap_to_click 				= 0
tap_and_drag 				= 0
drag_lock 					= 0
trackpad_natural_scrolling 	= 0
disable_while_typing 		= 1
left_handed 				= 0
middle_button_emulation 	= 0
trackpad_accel_profile 		= 1
trackpad_accel_speed 		= 0.75

# Mouse
mouse_natural_scrolling = 0
mouse_accel_profile 	= 1
mouse_accel_speed 		= -0.5

# Appearance
gappih 				= 10
gappiv 				= 10
gappoh 				= 10
gappov 				= 10
borderpx 			= 2
rootcolor 			= 0x071a2cff
bordercolor 		= 0x1a3548ff
focuscolor 			= 0x4fb8f0ff
maximizescreencolor = 0x4fb8f0ff
urgentcolor 		= 0xff7e6bff

# Tag Layout
tagrule = id:1,	layout_name:fair
tagrule = id:2,	layout_name:fair
tagrule = id:3,	layout_name:fair
tagrule = id:4,	layout_name:fair
tagrule = id:5,	layout_name:fair
tagrule = id:6,	layout_name:fair
tagrule = id:7,	layout_name:fair
tagrule = id:8,	layout_name:fair
tagrule = id:9,	layout_name:fair

# Layout Settings
new_is_master 	= 0
default_mfact 	= 0.5
smartgaps 		= 0

# Key Bindings
bind = SUPER,	Return,	spawn,	foot
bind = SUPER,	Space,	spawn,	foot --app-id=fsel fsel -d

bind = SUPER+CTRL,	r,	spawn,	~/.config/scripts/reload.sh
bind = SUPER+SHIFT,	r,	reload_config
bind = SUPER,		m,	quit
bind = SUPER,		q,	killclient

bind = ALT, 	Tab, 	focusstack, next
bind = SUPER, 	Left, 	focusdir, 	left
bind = SUPER, 	Right, 	focusdir, 	right
bind = SUPER, 	Up, 	focusdir, 	up
bind = SUPER, 	Down, 	focusdir, 	down

bind = SUPER+SHIFT,	Up,		exchange_client,	up
bind = SUPER+SHIFT,	Down,	exchange_client,	down
bind = SUPER+SHIFT,	Left,	exchange_client,	left
bind = SUPER+SHIFT,	Right,	exchange_client,	right

bind = SUPER,		backslash,	togglefloating
bind = SUPER,		f,			togglemaximizescreen
bind = SUPER+SHIFT,	f,			togglefullscreen
bind = SUPER,		i,			minimized
bind = SUPER+SHIFT,	i,			restore_minimized

bind = SUPER,	1,	view,	1,	0
bind = SUPER,	2,	view,	2,	0
bind = SUPER,	3,	view,	3,	0
bind = SUPER,	4,	view,	4,	0
bind = SUPER,	5,	view,	5,	0
bind = SUPER,	6,	view,	6,	0
bind = SUPER,	7,	view,	7,	0
bind = SUPER,	8,	view,	8,	0
bind = SUPER,	9,	view,	9,	0

bind = SUPER+SHIFT,	1,	tag,	1,	0
bind = SUPER+SHIFT,	2,	tag,	2,	0
bind = SUPER+SHIFT,	3,	tag,	3,	0
bind = SUPER+SHIFT,	4,	tag,	4,	0
bind = SUPER+SHIFT,	5,	tag,	5,	0
bind = SUPER+SHIFT,	6,	tag,	6,	0
bind = SUPER+SHIFT,	7,	tag,	7,	0
bind = SUPER+SHIFT,	8,	tag,	8,	0
bind = SUPER+SHIFT,	9,	tag,	9,	0

mousebind = SUPER,	btn_left,	moveresize,	curmove
mousebind = SUPER,	btn_right,	moveresize,	curresize

# Window rules
windowrule = appid:fsel,	isfloating:1
